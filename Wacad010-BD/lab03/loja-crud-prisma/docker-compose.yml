
services:
  mysql:
    image: mysql:8.0
    container_name: mysql_loja_crud
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: loja_crud
    ports:
      - "3308:3306"
    volumes:
      - mysql_loja_crud_data:/var/lib/mysql

volumes:
  mysql_loja_crud_data:
