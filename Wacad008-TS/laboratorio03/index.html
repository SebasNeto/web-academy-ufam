<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Carrinho de Compras</h1>

    <div class="formulario">

        <select id="tipoProduto">
            <option value="tv">TV</option>
            <option value="celular">Celular</option>
            <option value="bicicleta">Bicicleta</option>
        </select>

        <input type="text" id="modelo" placeholder="Modelo">

        <input type="text" id="fabricante" placeholder="Fabricante">

        <input type="number" id="valor" placeholder="Valor">

        <input type="text" id="atributo" placeholder="Atributo específico">

        <button id="btnAdicionar">
            Adicionar Produto
        </button>

    </div>

    <div class="estatisticas">
        <h2>Resumo do Carrinho</h2>

        <p>Quantidade de Produtos: <span id="quantidade">0</span></p>

        <p>Valor Total: R$ <span id="valorTotal">0.00</span></p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Tipo</th>
                <th>Modelo</th>
                <th>Fabricante</th>
                <th>Valor</th>
                <th>Detalhe</th>
                <th>Ação</th>
            </tr>
        </thead>

        <tbody id="listaProdutos"></tbody>
    </table>

</div>

<script src="app.js"></script>

</body>
</html>
