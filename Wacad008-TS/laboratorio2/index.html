<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turma de Educação Física</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Turma Web Academy</h1>

        <div class="formulario">
            <input type="text" id="nome" placeholder="Nome Completo">

            <input type="number" id="idade" placeholder="Idade">

            <input type="number" id="altura" step="0.01" placeholder="Altura (m)">

            <input type="number" id="peso" step="0.01" placeholder="Peso (kg)">

            <button id="btnSalvar">Adicionar Aluno</button>
        </div>

        <div class="estatisticas">
            <h2>Estatísticas da Turma</h2>

            <p>Total de alunos: <span id="numAlunos">0</span></p>
            <p>Média das idades: <span id="mediaIdades">0</span></p>
            <p>Média das alturas: <span id="mediaAlturas">0</span></p>
            <p>Média dos pesos: <span id="mediaPesos">0</span></p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Altura</th>
                    <th>Peso</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaAlunos"></tbody>
        </table>
    </div>

    <script src="app.js"></script>

</body>
</html>
