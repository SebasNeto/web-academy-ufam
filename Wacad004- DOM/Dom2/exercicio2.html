<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tarefas</title>

    <style>
        .card-tarefa { 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid;  
        }
        
        .card-sucesso { 
            background-color: #d4edda; 
        }
    </style>
</head>
<body>
    <div id="painel-sprint" style="max-width: 400px;">
    <h2>Tarefas da Sprint</h2>

        <div class="card-tarefa card-desatualizado">
            <h3 style="margin-top: 0;">Criar Banco de Dados</h3>
            <p>Status: <span>Finalizada</span></p>
        </div>

        <div class="card-tarefa card-urgente">
            <h3 style="margin-top: 0;">Corrigir bug de Login</h3>
            <p>Status: <span>Urgente</span></p>
        </div>

        <div class="card-tarefa card-desatualizado">
            <h3 style="margin-top: 0;">Atualizar Documentação</h3>
            <p>Status: <span>Finalizada</span></p>
        </div>

        <div class="card-tarefa card-desatualizado">
            <h3 style="margin-top: 0;">Subi a última versão para o Github</h3>
            <p>Status: <span>Finalizada</span></p>
        </div>

        <div class="card-tarefa card-urgente">
            <h3 style="margin-top: 0;">Corrigir os Testes</h3>
            <p>Status: <span>Urgente</span></p>
        </div>

    </div>

    <script>
        const cardsDesatualizados = document.querySelectorAll('.card-desatualizado');
        cardsDesatualizados.forEach(card => {
            card.classList.remove('card-desatualizado');
            card.classList.add('card-sucesso');
        });

        const cardsUrgentes = document.querySelectorAll('.card-urgente');
        cardsUrgentes.forEach(card => {
            card.style.backgroundColor = '#f8d7da';
        });

        const statusTextos = document.querySelectorAll('span');
        statusTextos.forEach(status => {
            status.style.fontWeight = 'bold';
        });
    </script>
</body>
</html>
