<!DOCTYPE html>
<html >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>
<body>
    <div id="app-tarefas">
    <h3>Minhas Tarefas</h3>
    
    <input type="text" id="input-nova-tarefa" placeholder="Digite uma tarefa...">
    <button id="btn-adicionar">Adicionar Tarefa</button>

    <ul id="lista-tarefas">
        <li>Revisar código da aula passada</li>
    </ul>
    </div>

    <script>
        const inputTarefa = document.getElementById('input-nova-tarefa');
        const btnAdicionar = document.getElementById('btn-adicionar');
        const listaTarefas = document.getElementById('lista-tarefas');

        btnAdicionar.addEventListener('click', function() {
            const textoTarefa = inputTarefa.value.trim();

            if (textoTarefa !== "") {
                const novaTarefa = document.createElement('li');
                novaTarefa.innerText = textoTarefa;
                listaTarefas.appendChild(novaTarefa);
                inputTarefa.value = "";
            }
        });
    </script>
</body>
</html>
