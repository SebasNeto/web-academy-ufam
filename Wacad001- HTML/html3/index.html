<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Layout Semântico HTML5</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            background-color: #ffffff;
            margin: 20px;
        }

        .container {
            background-color: #f3f3f3;
            padding: 15px;
            border-radius: 8px;
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: center;
            font-size: 18px;
        }

        .box {
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
        }

        header {
            background-color: #ff8096;
            height: 60px;
            font-size: 26px;
        }

        nav {
            background-color: #5ce3a0;
            height: 30px;
        }

        .middle-content {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        aside {
            background-color: #fad1da;
            width: 35%;
        }

        main {
            background-color: #cbeefd;
            width: 65%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            gap: 10px;
            box-sizing: border-box;
            border-radius: 4px;
        }

        article {
            background-color: #6edbfd;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            gap: 10px;
            box-sizing: border-box;
            border-radius: 4px;
        }

        figure {
            background-color: #fff1a7;
            width: 100%;
            height: 50px;
            margin: 0;
        }

        p {
            background-color: #e4f99e;
            width: 100%;
            height: 50px;
            margin: 0;
        }

        section {
            background-color: #00a4ff;
            width: 100%;
            height: 40px;
        }

        footer {
            background-color: #ba86ff;
            height: 60px;
            font-size: 26px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header class="box">&lt;header&gt;</header>
        
        <nav class="box">&lt;nav&gt;</nav>
        
        <div class="middle-content">
            <aside class="box">&lt;aside&gt;</aside>
            
            <main>
                <div>&lt;main&gt;</div>
                
                <article>
                    <div>&lt;article&gt;</div>
                    <figure class="box">&lt;figure&gt;</figure>
                    <p class="box">&lt;p&gt;</p>
                </article>
                
                <section class="box">&lt;section&gt;</section>
            </main>
        </div>
        
        <footer class="box">&lt;footer&gt;</footer>
        
    </div>

</body>
</html>
